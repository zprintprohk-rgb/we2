name = "togthr-life"
account_id = "32c174efaa22353f357c0fdff9d61b86"
main = ".open-next/worker.js"
compatibility_date = "2026-05-29"
compatibility_flags = ["nodejs_compat"]

# ─── Non-sensitive env vars (production defaults) ────────────────────────
# Sensitive vars (SUPABASE_SERVICE_ROLE_KEY, PAYPAL_CLIENT_SECRET, etc.)
# are set via CLI: npx wrangler secret put <KEY>
[vars]
NEXT_PUBLIC_SITE_URL = "https://togthr.life"
NEXTJS_ENV = "production"
PAYPAL_MODE = "live"
# ⚠️ Below must be set before deploy — either fill here or via wrangler secret
NEXT_PUBLIC_SUPABASE_URL = ""
NEXT_PUBLIC_SUPABASE_ANON_KEY = ""
PAYPAL_CLIENT_ID = ""
ALIPAY_APP_ID = ""
ALIPAY_PUBLIC_KEY = ""
VAPID_PUBLIC_KEY = ""
CRON_SECRET = ""  # protects /api/cron/* endpoints

# Cron trigger: daily UTC 0:00 to check expired subscriptions
[triggers]
crons = ["0 0 * * *"]

# Static assets (OpenNext auto-generates .open-next/assets/)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# R2 bucket (togthr-images — for skin sprites, capsule media, sticker PNGs)
[[r2_buckets]]
binding = "R2"
bucket_name = "togthr-images"
