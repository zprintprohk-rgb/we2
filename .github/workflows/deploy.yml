name: Deploy to Workers
on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual 'Run workflow' button in GitHub Actions UI
    inputs:
      reason:
        description: 'Why manual run? (optional)'
        required: false
        default: 'manual retry'

# Cancel any in-flight run for the same branch to avoid double-deploy
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # ─── Force clean state to avoid "Exit Code 1" from stale caches ───
      - name: Clean previous build artifacts & npm cache
        run: |
          rm -rf node_modules .next .open-next .wrangler
          npm cache clean --force || true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*      # automatically follow Node.js LTS (currently 22); avoids manual bumps
          cache: 'npm'              # caches ~/.npm to speed up subsequent runs

      - name: Verify runtime versions
        run: |
          echo "Node: $(node --version)"
          echo "npm:  $(npm --version)"

      - name: Install dependencies (strict, lockfile-exact)
        # Use 'npm ci' instead of 'npm install' so we get the EXACT versions
        # in package-lock.json. If lockfile is missing/corrupt, npm ci fails
        # immediately (Exit 1) with a clear message, instead of npm install
        # silently installing whatever semver satisfies and producing a
        # different tree on every run.
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json missing — run 'npm install' locally first to generate it, then commit."
            exit 1
          fi
          npm ci --no-audit --no-fund

      - name: Build (Next + OpenNext for Cloudflare)
        run: set -euo pipefail && npm run cf-build

      - name: Deploy to Cloudflare Workers (force overwrite, debug-level)
        # --log-level=debug makes wrangler print every network call + the
        # exact error from Cloudflare's API, so we can finally see the
        # real 'Exit Code 1' reason instead of guessing.
        run: npx wrangler deploy --force --log-level=debug
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # On failure, upload debug artifacts so we can see exactly where
      # the build broke without re-running the whole pipeline.
      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-debug-logs
          path: |
            .next/
            .open-next/
            npm-debug.log
            build-error.log
          if-no-files-found: ignore
          retention-days: 7
