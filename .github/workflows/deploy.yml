name: Deploy to Workers
on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual 'Run workflow' button in GitHub Actions UI
    inputs:
      reason:
        description: 'Why manual run? (optional)'
        required: false
        default: 'manual retry'

# Cancel any in-flight run for the same branch to avoid double-deploy
concurrency:
  group: deploy-${{ github.ref }}
  # Was 'true' but we discovered it was masking a real bug: when #36
  # (f52af6f) pushed, an in-flight run could be cancelled mid-wrangler-deploy
  # and wrangler still reported exit 0 to GitHub, leaving the run as a
  # false-positive green. Cloudflare's Deployments tab then shows no new
  # version. 'false' means concurrent pushes will just both run — slower
  # but honest, and we'll see the real Cloudflare response in the log.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # ─── Force clean state to avoid "Exit Code 1" from stale caches ───
      - name: Clean previous build artifacts & npm cache
        run: |
          rm -rf node_modules .next .open-next .wrangler
          npm cache clean --force || true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*      # automatically follow Node.js LTS (currently 22); avoids manual bumps
          cache: 'npm'              # caches ~/.npm to speed up subsequent runs

      - name: Verify runtime versions
        run: |
          echo "Node: $(node --version)"
          echo "npm:  $(npm --version)"

      - name: Install dependencies (strict, lockfile-exact)
        # Use 'npm ci' instead of 'npm install' so we get the EXACT versions
        # in package-lock.json. If lockfile is missing/corrupt, npm ci fails
        # immediately (Exit 1) with a clear message, instead of npm install
        # silently installing whatever semver satisfies and producing a
        # different tree on every run.
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json missing — run 'npm install' locally first to generate it, then commit."
            exit 1
          fi
          npm ci --no-audit --no-fund

      - name: Build (Next + OpenNext for Cloudflare)
        run: set -euo pipefail && npm run cf-build

      - name: Pre-deploy diagnostics (artifact + secret + config check)
        # MUST pass the env: here too, otherwise the script sees
        # CLOUDFLARE_API_TOKEN as unset and the secret check
        # false-positives even when the secret IS set in GitHub.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # This step fails fast with a clear error if anything is missing,
        # so the actual wrangler error is never lost in a 1m10s deploy
        # attempt. Prints artifact sizes + verifies secret presence
        # (without ever printing the secret value) + validates wrangler.toml.
        run: |
          echo "==== .open-next artifacts ===="
          ls -lah .open-next/ 2>&1 || { echo "::error::.open-next/ does not exist — build step did not produce OpenNext output"; exit 1; }
          ls -lah .open-next/assets/ 2>&1 | head -20 || echo "WARNING: .open-next/assets/ missing"
          echo ""
          echo "==== worker.js sanity check ===="
          if [ -f .open-next/worker.js ]; then
            echo "worker.js size: $(du -h .open-next/worker.js | cut -f1)"
            echo "worker.js head:"
            head -3 .open-next/worker.js
            echo "worker.js tail:"
            tail -3 .open-next/worker.js
          else
            echo "::error::.open-next/worker.js missing — wrangler deploy will fail"
            exit 1
          fi
          echo ""
          echo "==== Secret check (no value printed) ===="
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty — add it in GitHub repo Settings > Secrets > Actions"
            exit 1
          else
            echo "CLOUDFLARE_API_TOKEN present (length: ${#CLOUDFLARE_API_TOKEN} chars, prefix: ${CLOUDFLARE_API_TOKEN:0:6}...)"
          fi
          echo ""
          echo "==== wrangler.toml validation ===="
          npx wrangler --version
          echo ""
          echo "==== wrangler whoami (token identity check) ===="
          # If CLOUDFLARE_API_TOKEN is valid, wrangler whoami prints the
          # account email and account ID. If it is invalid/expired/insufficient
          # scope, wrangler prints an error and EXITS NON-ZERO. This is the
          # most reliable way to detect a token that 'looks set' in GitHub
          # secrets but is actually rejected by Cloudflare.
          npx wrangler whoami 2>&1 || {
            echo "::error::wrangler whoami failed — CLOUDFLARE_API_TOKEN is invalid, expired, or missing required scopes (needs Workers Scripts:Edit + Account Settings:Read)"
            exit 1
          }

      - name: Deploy to Cloudflare Workers (force overwrite, debug-level)
        # --log-level=debug makes wrangler print every network call + the
        # exact error from Cloudflare's API, so we can finally see the
        # real 'Exit Code 1' reason instead of guessing.
        #
        # ⚠️  set -euo pipefail is MANDATORY here. Without pipefail,
        # bash uses tee's exit code (always 0) as the pipeline's exit
        # code, so wrangler deploy failing with 403/10000/Insufficient
        # permissions shows as a green tick while the real error sits
        # silent in wrangler-deploy.log. This is the root cause of the
        # 9-run 'false success' mystery — wrangler NEVER actually
        # pushed; CI just couldn't see it fail.
        run: |
          set -euo pipefail
          npx wrangler deploy --force --log-level=debug 2>&1 | tee wrangler-deploy.log
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ALWAYS upload wrangler-deploy.log (not just on failure) so we
      # can verify the actual Cloudflare response — even when the run
      # reports success. We discovered run #36 reported green but
      # wrangler never pushed to Cloudflare; without this artifact we
      # had no way to see why. Path is narrowed to just the log files
      # (not .next/ or .open-next/) to keep artifact size < 100MB.
      - name: Post-deploy (CF API verification)
        # This is the DEFINITIVE check. If wrangler deploy reported
        # success but the API says the latest deployment is still
        # 4393fac1 (3 hours old), then the push really did not reach
        # Cloudflare and we know to rotate the token / fix the
        # permissions. Without this step we have to guess from the
        # dashboard screenshots alone.
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # ⚠️  set -euo pipefail + '|| true' on every grep is mandatory.
        # Without these, a missing match silently aborts the step
        # (with -e) or tee's exit code masks failures (without pipefail),
        # the same trap that hid wrangler's true failure for 9 runs.
        run: |
          set -euo pipefail
          echo "==== wrangler deployments list we2-v3 (latest 5) ===="
          npx wrangler deployments list we2-v3 2>&1 | tee wrangler-deployments.log | head -60 || echo "wrangler deployments list command failed"
          echo ""
          echo "==== Direct Cloudflare REST API query ===="
          # Get account ID via wrangler whoami (|| true on each grep so a
          # missing 'Account ID:' line does not abort the step).
          ACCOUNT_ID=$( (npx wrangler whoami 2>&1 || true) | grep -oE 'Account ID:[[:space:]]*[a-f0-9]+' | grep -oE '[a-f0-9]{32}' | head -1 || true)
          echo "Account ID: ${ACCOUNT_ID:-<not detected>}"
          if [ -n "${ACCOUNT_ID:-}" ]; then
            HTTP_CODE=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/we2-v3/deployments?per_page=5" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -o cloudflare-api-deployments.json -w "%{http_code}" || echo "curl_failed")
            echo "HTTP status: ${HTTP_CODE}"
            echo "---- Response body (pretty-printed if jq available) ----"
            if command -v jq >/dev/null 2>&1; then
              jq . cloudflare-api-deployments.json 2>&1 | head -100
            else
              cat cloudflare-api-deployments.json
            fi
            echo ""
            echo "---- Extracted deployment IDs (top 5) ----"
            grep -oE '"id"[[:space:]]*:[[:space:]]*"[a-f0-9-]+"' cloudflare-api-deployments.json | head -5 || true
            echo "---- Extracted created_on timestamps (top 5) ----"
            grep -oE '"created_on"[[:space:]]*:[[:space:]]*"[^"]+"' cloudflare-api-deployments.json | head -5 || true
            echo ""
            # DEFINITIVE check: if the latest deployment is still 4393fac1
            # (3+ hours old), the push did NOT actually land. The wrangler
            # deploy step (above) reported success but Cloudflare never
            # received a new version. Compare only the first 8 hex chars
            # because Cloudflare returns full UUIDs while the dashboard
            # shows short IDs.
            LATEST_ID=$(grep -oE '"id"[[:space:]]*:[[:space:]]*"[a-f0-9-]+"' cloudflare-api-deployments.json | head -1 | sed -E 's/.*"([a-f0-9-]+)".*/\1/' || true)
            echo "Latest deployment ID (parsed): ${LATEST_ID:-<none>}"
            if [ -n "${LATEST_ID:-}" ] && echo "${LATEST_ID}" | grep -qiE '^4393fac1'; then
              echo "::error::Latest deployment is still 4393fac1 (3+ hours old). wrangler deploy reported success but the push did NOT reach Cloudflare. Most likely cause: CLOUDFLARE_API_TOKEN is missing the 'Workers Scripts:Edit' scope. Fix: https://dash.cloudflare.com/profile/api-tokens \u2192 edit the token \u2192 enable 'Workers Scripts:Edit' + 'Account Settings:Read' + 'Workers KV Storage:Edit'."
              exit 1
            fi
          fi

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-debug-logs
          path: |
            wrangler-deploy.log
            wrangler-deployments.log
            cloudflare-api-deployments.json
            npm-debug.log
            build-error.log
          if-no-files-found: ignore
          retention-days: 7
